<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>1 Euro Project</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #eef7f5, #f7f7f2);
      color: #0d2b2b;
      text-align: center;
      overflow-x: hidden;
    }

    .euro-image {
      width: 130px;
      height: 130px;
      margin-top: 35px;
      margin-bottom: 25px;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 78px;
      line-height: 1.05;
      font-weight: 700;
      color: #0b2f2f;
      margin: 20px auto 30px;
      letter-spacing: -1px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.08);
    }

    h1 span {
      color: #d4a017;
    }

    p {
      font-size: 20px;
      line-height: 1.7;
      color: #3d4b4b;
      max-width: 900px;
      margin: auto;
    }

    .donate-button {
      display: inline-block;
      background: linear-gradient(135deg,#d4a017,#f0c14b);
      color: white;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 20px;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      margin-top: 25px;
    }

    .donate-button:hover {
      transform: translateY(-2px);
    }

    .payment-methods {
      display: none;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .payment-methods.show {
      display: flex;
    }

    .pay-icon {
      width: 92px;
      padding: 10px 8px;
      border-radius: 14px;
      background: #ffffff;
      color: #0b2f2f;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      font-weight: 700;
      font-size: 14px;
      transition: 0.25s;
    }

    .pay-icon i {
      display: block;
      font-size: 24px;
      margin-bottom: 5px;
    }

    .pay-icon:hover {
      transform: translateY(-2px);
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
    }

    .social-icons a {
      text-decoration: none;
      font-size: 32px;
      color: #222;
      transition: 0.3s;
    }

    .social-icons a:hover {
      transform: scale(1.15);
      color: #d4a017;
    }

    .flag-select {
      margin-top: 35px;
    }

    .flag-select p {
      font-size: 18px;
      margin-bottom: 12px;
    }

    .flag-select img {
      width: 32px;
      margin: 0 7px;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    .flag-select img:hover {
      transform: scale(1.12);
    }

    .bottom-section {
      margin-top: 90px;
      background: linear-gradient(135deg,#062f2f,#0a4747);
      color: white;
      padding: 75px 30px;
      border-top-left-radius: 80px;
      border-top-right-radius: 80px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .card {
      max-width: 300px;
    }

    .card h3 {
      font-size: 30px;
      margin-bottom: 20px;
      color: #f0c14b;
    }

    .card p {
      color: #d7d7d7;
      font-size: 17px;
    }

    .section-button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 22px;
      background: #f0c14b;
      color: #062f2f;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.3s;
    }

    .section-button:hover {
      transform: translateY(-2px);
      background: #ffd96a;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 46px;
      }

      p {
        font-size: 17px;
        padding: 0 18px;
      }

      .pay-icon {
        width: 82px;
      }
    }
  </style>
</head>

<body>

  <img src="euro-145386_1280.png" alt="1 Euro" class="euro-image" />

  <h1 id="title"></h1>

  <p id="subtitle"></p>

  <a href="javascript:void(0)" onclick="togglePayments()" class="donate-button" id="donateBtn">
    Donează 1 Euro
  </a>

  <div class="payment-methods" id="paymentMethods">
    <a href="https://www.paypal.com/pool/9phPSUj1Oe?sr=accr" target="_blank" class="pay-icon paypal-btn">
      <i class="fab fa-paypal"></i>
      <span id="paypalBtn">PayPal</span>
    </a>

    <a href="https://revolut.me/all1euro?currency=EUR&amount=100" target="_blank" class="pay-icon revolut-btn">
      <i class="fas fa-bold"></i>
      <span id="revolutBtn">Revolut</span>
    </a>

    <a href="https://buy.stripe.com/5kQfZgeEG61d4Vy12scwg00" target="_blank" class="pay-icon stripe-btn">
      <i class="far fa-credit-card"></i>
      <span id="cardBtn">Card</span>
    </a>
  </div>

  <div class="social-icons">
    <a href="LINK_FACEBOOK" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="LINK_INSTAGRAM" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="LINK_TIKTOK" target="_blank"><i class="fab fa-tiktok"></i></a>
    <a href="LINK_YOUTUBE" target="_blank"><i class="fab fa-youtube"></i></a>
  </div>

  <div class="flag-select">
    <p id="language-label"></p>
    <img src="https://flagcdn.com/40x30/ro.png" alt="Română" onclick="setLang('ro')">
    <img src="https://flagcdn.com/40x30/gb.png" alt="English" onclick="setLang('en')">
    <img src="https://flagcdn.com/40x30/de.png" alt="Deutsch" onclick="setLang('de')">
    <img src="https://flagcdn.com/40x30/es.png" alt="Español" onclick="setLang('es')">
    <img src="https://flagcdn.com/40x30/ru.png" alt="Русский" onclick="setLang('ru')">
    <img src="https://flagcdn.com/40x30/sa.png" alt="العربية" onclick="setLang('ar')">
    <img src="https://flagcdn.com/40x30/cn.png" alt="中文" onclick="setLang('zh')">
  </div>

  <div class="bottom-section">
    <div class="cards">

      <div class="card">
        <h3 id="testimonialTitle"></h3>
        <p id="testimonialText"></p>
        <a href="mailto:contact@1europroject.com?subject=Testimonial 1 Euro Project" class="section-button" id="testimonialBtn"></a>
      </div>

      <div class="card">
        <h3 id="impactTitle"></h3>
        <p id="impactText"></p>
        <a href="#" class="section-button" id="impactBtn"></a>
      </div>

      <div class="card">
        <h3 id="ideaTitle"></h3>
        <p id="ideaText"></p>
        <a href="mailto:contact@1europroject.com?subject=Propunere idee / caz social" class="section-button" id="ideaBtn"></a>
      </div>

    </div>
  </div>

    function setLang(lang) {
      if (!translations[lang]) return;

      document.getElementById("title").innerHTML = translations[lang].title;
      document.getElementById("subtitle").innerHTML = translations[lang].subtitle;
      document.getElementById("donateBtn").innerText = translations[lang].donate;
      document.getElementById("language-label").innerText = translations[lang].languageLabel;

      document.getElementById("cardBtn").innerText = translations[lang].card;
      document.getElementById("paypalBtn").innerText = translations[lang].paypal;
      document.getElementById("revolutBtn").innerText = translations[lang].revolut;

      document.getElementById("testimonialTitle").innerText = translations[lang].testimonialTitle;
      document.getElementById("testimonialText").innerText = translations[lang].testimonialText;
      document.getElementById("testimonialBtn").innerText = translations[lang].testimonialBtn;

      document.getElementById("impactTitle").innerText = translations[lang].impactTitle;
      document.getElementById("impactText").innerHTML = translations[lang].impactText;
      document.getElementById("impactBtn").innerText = translations[lang].impactBtn;

      document.getElementById("ideaTitle").innerText = translations[lang].ideaTitle;
      document.getElementById("ideaText").innerText = translations[lang].ideaText;
      document.getElementById("ideaBtn").innerText = translations[lang].ideaBtn;

      document.documentElement.lang = lang;
    }

    function togglePayments() {
      document.getElementById("paymentMethods").classList.toggle("show");
    }

    window.onload = function() {
      const userLang = navigator.language || navigator.userLanguage;
      const shortLang = userLang.split('-')[0];

      if (translations[shortLang]) {
        setLang(shortLang);
      } else {
        setLang('ro');
      }
    };
  </script>

</html>
